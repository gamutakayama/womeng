        border-radius: 50%;
        color: #3bd671;
        height: 100%;
        position: relative;
        width: 100%;
      }

      .uptimerobot::after {
        animation: pulse 2s infinite;
        background: currentColor;
        border-radius: 50%;
        content: "";
        height: 100%;
        left: 0;
        opacity: 1;
        position: absolute;
        top: 0;
        width: 100%;
      }

      @keyframes pulse {
        0% {
          opacity: 0.5;
        }

        70% {

          transform: scale(2.5);
        }

        to {

        }
